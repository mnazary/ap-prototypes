<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AP Marketing 4CID Prototype v5</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#f8fafc;color:#0f172a}.wrap{max-width:900px;margin:0 auto;padding:24px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;box-shadow:0 1px 4px #0001;overflow:hidden}.body{padding:22px}.hdr{background:#0f172a;color:#fff;padding:18px 22px}.k{font:11px ui-monospace,monospace;letter-spacing:.1em;text-transform:uppercase;color:#94a3b8;margin-bottom:4px}.title{font:700 19px Georgia,serif;line-height:1.35}.logo{width:34px;height:34px;border-radius:8px;background:#1e40af;color:#fff;display:inline-flex;align-items:center;justify-content:center;font:800 13px ui-monospace,monospace;margin-right:10px}h1{font:700 28px Georgia,serif;margin:14px 0 8px}.muted{color:#64748b;line-height:1.6;font-size:14px}.tiers{display:grid;gap:8px;margin:20px 0}.tier{display:flex;align-items:center;gap:12px;padding:13px;border:1px solid #e5e7eb;background:#f8fafc;border-radius:10px;cursor:pointer}.tier:hover{box-shadow:0 0 0 2px #1e40af}.num{width:30px;height:30px;border-radius:50%;background:#dbeafe;color:#1e40af;display:flex;align-items:center;justify-content:center;font:800 13px ui-monospace,monospace}.small{font-size:12px;color:#64748b}.btn{border:0;border-radius:8px;background:#1e40af;color:white;padding:12px 18px;font-weight:800;cursor:pointer}.btn.full{width:100%;padding:14px}.btn2{border:1px solid #e2e8f0;border-radius:7px;background:#fff;color:#475569;padding:9px 13px;font-weight:700;cursor:pointer}.nav{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}.navdots{display:flex;gap:6px;flex-wrap:wrap}.dot{width:30px;height:30px;border-radius:50%;border:2px solid #e2e8f0;background:#f1f5f9;color:#94a3b8;font:800 11px ui-monospace,monospace;cursor:pointer}.dot.active{border-color:#1e40af;background:#dbeafe;color:#1e40af}.dot.done{border-color:#1e40af;background:#1e40af;color:white}.barbox{margin-bottom:16px}.barlabels{display:flex;justify-content:space-between;font:11px ui-monospace,monospace;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin-bottom:5px}.bars{display:flex;gap:4px}.bar{height:4px;flex:1;border-radius:2px;background:#e5e7eb}.info{padding:14px 16px;border-radius:8px;border:1px solid;margin-bottom:12px;font-size:13px;line-height:1.6}.context{background:#eef2ff;border-color:#c7d2fe;color:#3730a3}.neutral{background:#f8fafc;border-color:#cbd5e1;color:#334155}.green{background:#f0fdf4;border-color:#86efac;color:#166534}.red{background:#fef2f2;border-color:#fecaca;color:#991b1b}.yellow{background:#fefce8;border-color:#fde68a;color:#92400e}.prompt{font:16px Georgia,serif;line-height:1.65;margin-bottom:16px;color:#1f2937}.opt{width:100%;padding:11px 14px;border-radius:8px;border:1.5px solid #e5e7eb;background:#f9fafb;text-align:left;cursor:pointer;margin-bottom:8px;font-size:14px;line-height:1.5;display:flex;gap:10px}.opt.correct{background:#f0fdf4;border-color:#4ade80;color:#166534}.opt.wrong{background:#fef2f2;border-color:#f87171;color:#991b1b}.letter{font:800 13px ui-monospace,monospace;min-width:18px}textarea,select{width:100%;padding:12px;border-radius:8px;border:1.5px solid #d1d5db;font-size:14px;line-height:1.6;outline:none;background:#fff}textarea{min-height:110px;resize:vertical}label{display:block;font-size:12px;font-weight:800;color:#334155;margin-bottom:5px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{margin-bottom:12px}.spread{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:12px;flex-wrap:wrap}.meta{margin-top:20px;padding:12px 14px;background:#f8fafc;border:1px dashed #cbd5e1;border-radius:8px}.meta h3,.portfolio h3{font:11px ui-monospace,monospace;text-transform:uppercase;letter-spacing:.1em;color:#64748b;margin-bottom:4px}.meta p{font-size:12px;color:#475569}.portfolio{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;margin-top:18px}.pi{font-size:12px;color:#475569;padding:5px 0;border-top:1px solid #e2e8f0}.pi:first-of-type{border-top:0}.tbl{width:100%;border-collapse:collapse;margin:12px 0 16px;font-size:13px}.tbl th{background:#f1f5f9;color:#334155;text-align:left}.tbl th,.tbl td{padding:8px;border:1px solid #e2e8f0;vertical-align:top}.foot{display:flex;justify-content:space-between;color:#cbd5e1;font:11px ui-monospace,monospace;margin-top:16px}@media(max-width:720px){.wrap{padding:16px}.nav{flex-direction:column;align-items:flex-start}.grid{grid-template-columns:1fr}}
</style></head><body><div id="root"></div><script>
const ROLE='You are a Marketing Coordinator at Nova Bottle Co., a small consumer products company preparing to launch a new reusable water bottle. The team has not yet chosen the initial ideal customer profile.';const P='Each task saves one piece of evidence into a campaign portfolio. The final screen is not a new assignment from scratch. It is where you assemble and polish the artifacts you have already built.';const T=[['Define the ICP','Part-Task Practice','High Scaffold','#4ade80','🎯','Students isolate ideal customer profile selection before building a full campaign.'],['Position the Product','Procedural Information + Part-Task Practice','High-Moderate Scaffold','#a3e635','🧭','Students use a positioning template to connect audience, need, benefit, differentiation, and proof.'],['Critique AI Messaging','Supportive Information + Whole Task','Moderate Scaffold','#facc15','🤖','Students evaluate AI-generated marketing work for audience fit, unsupported claims, ethics, and strategic quality.'],['Prioritize Campaign Bets','Whole Task with Scaffold','Low Scaffold','#fb923c','📊','Students interpret campaign data under resource constraints and choose a top priority and a deprioritized initiative.'],['Assemble Portfolio Brief','Whole Professional Task','No Scaffold','#f87171','📝','Students synthesize prior artifacts into a professional campaign recommendation.']];
const s={started:false,tier:1,sel:null,p:{icp:'',pos:'',ai:'',prio:'',final:''}};function esc(x){return String(x).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function setTier(i){s.started=true;s.tier=i;render()}function start(){setTier(1)}function back(){s.tier===1?s.started=false:s.tier--;render()}function save(k,v){s.p[k]=v}
function overview(){return `<div class=wrap><div class=card><div class=body><span class=logo>AP</span><span class=k>AP Marketing & Sales</span><h1>Marketing Prototype: Campaign Brief Portfolio</h1><p class=muted><b>Role:</b> ${ROLE}</p><br><p class=muted><b>Portfolio goal:</b> ${P}</p><div class=tiers>${T.map((t,i)=>`<div class=tier onclick=setTier(${i+1})><div class=num>${i+1}</div><div style=flex:1><b>${t[0]}</b><div class=small>${t[1]}</div></div><span style="width:9px;height:9px;border-radius:50%;background:${t[3]}"></span></div>`).join('')}</div><button class="btn full" onclick=start()>Begin from Task 1 →</button></div></div></div>`}
function head(i){return ['Your manager needs a clear ideal customer profile before the team spends money on creative and media.','The creative team needs a positioning statement before drafting campaign assets.','You used AI to draft campaign messaging. Now you need to review the output before it reaches your manager.','The team has limited time and budget. You cannot run every campaign bet this month.','Assemble and polish the portfolio artifacts you built into one campaign recommendation brief.'][i-1]}
function shell(c){let i=s.tier,t=T[i-1];return `<div class=wrap><div class=nav><div><button class=btn2 onclick=back()>← ${i===1?'Overview':'Task '+(i-1)}</button> <span class=logo>AP</span><span class=k>Marketing Coordinator · Nova Bottle Co.</span></div><div class=navdots>${T.map((_,j)=>`<button class="dot ${j+1===i?'active':j+1<i?'done':''}" onclick=setTier(${j+1})>${j+1}</button>`).join('')}</div></div><div class=barbox><div class=barlabels><span>Scaffold Level</span><span style="color:${t[3]}">${t[2]}</span></div><div class=bars>${T.map((_,j)=>`<div class=bar style="background:${j+1<=i?t[3]:'#e5e7eb'}"></div>`).join('')}</div></div><div class=card><div class=hdr><div class=header-kicker>${t[4]} Task ${i}: ${t[0]}</div><div class=title>${head(i)}</div></div><div class=body>${c}${meta(i)}${portfolio()}</div></div><div class=foot><span>4CID · Real-World Task Transfer · AP Marketing</span><span>Mari Nazary | marinazary.com</span></div></div>`}
function ctx(x){return `<div class="info context"><b>Work task:</b> ${x}</div>`}function meta(i){let t=T[i-1];return `<div class=meta><h3>Demo Context · Task ${i} · ${t[0]}</h3><p>4CID: <b>${t[1]}</b> — ${t[5]}</p></div>`}function portfolio(){let arr=[['ICP',s.p.icp],['Positioning',s.p.pos],['AI critique',s.p.ai],['Campaign priority',s.p.prio],['Final brief',s.p.final]];return `<div class=portfolio><h3>Saved campaign portfolio</h3><div class=pi><b>What this is:</b> ${P}</div>${arr.map(a=>`<div class=pi><b>${a[0]}:</b> ${a[1]?esc(a[1]).slice(0,160)+(a[1].length>160?'...':''):'<span style=color:#94a3b8>Not yet saved</span>'}</div>`).join('')}</div>`}
function t1(){let opts=[['a','Parents buying bulk school supplies for elementary students'],['b','High school and college students who carry drinks between classes and care about style, convenience, and sustainability'],['c','Retired adults looking for durable hiking equipment'],['d','Office managers purchasing supplies for employee break rooms']];return `${ctx('Your manager asked you to identify the strongest ideal customer profile, or ICP, so the team can focus research, messaging, and media spend on one clear audience.')}<p class=prompt>Which audience should be the initial ICP for this launch?</p>${opts.map(o=>`<button class=opt onclick=aud('${o[0]}')><span class=letter>${o[0].toUpperCase()}.</span>${o[1]}</button>`).join('')}<div id=fb></div><div class=spread><span class=small>You can continue after selecting an answer. Top navigation also works.</span><button class=btn onclick=contAud()>Continue →</button></div>`}
function aud(id){s.sel=id;document.querySelectorAll('.opt').forEach((b,i)=>{let ids=['a','b','c','d'];b.className='opt';if(ids[i]==='b')b.classList.add('correct');if(ids[i]===id&&id!=='b')b.classList.add('wrong')});let msgs={a:'Parents may be purchasers, but they are not the clearest daily users for this campaign. Think about who carries the bottle every day and responds to the style and sustainability message.',b:'Correct. This ICP fits the product daily-use context, style angle, and sustainability message.',c:'Retired hikers could value durability, but that points to a different product position and channel plan. This launch is built around school-day convenience and student identity.',d:'Office managers are bulk buyers, not the strongest end-user audience for this launch. The campaign needs a specific consumer ICP, not a general procurement audience.'};let good=id==='b';document.getElementById('fb').innerHTML=`<div class="info ${good?'green':'red'}"><b>${good?'Correct.':'Not quite.'}</b> ${msgs[id]}</div>`}
function contAud(){if(!s.sel){alert('Select an answer first, or use the top navigation to jump to another task.');return}save('icp','High school and college students who carry drinks between classes and care about style, convenience, and sustainability.');setTier(2)}
function t2(){return `${ctx('The creative team is ready to draft ads, social posts, and landing page copy. Before they start, they need a positioning statement that explains who the product is for, what need it solves, and why it is different.')}<div class="info neutral"><b>Template:</b> For [ICP] who need [customer need], Nova Bottle is a [category] that provides [main benefit], unlike [alternative], because [reason to believe].</div><label>Positioning statement</label><textarea id=pos placeholder="For high school and college students who need...">${s.p.pos}</textarea><div class=spread><span class=small>No word minimum in this demo. Save when ready to continue.</span><button class=btn onclick=subPos()>Save & Continue →</button></div>`}function subPos(){let v=document.getElementById('pos').value.trim()||'[Demo note: positioning statement not completed]';save('pos',v);setTier(3)}
function t3(){return `${ctx('You used AI to generate first-draft campaign messaging. Before sharing it with your manager, you need to critique the output for audience fit, unsupported claims, and brand risk.')}<div class="info neutral"><b>AI draft:</b><br><em>“This eco-friendly bottle is perfect for everyone. It is the best bottle on the market, guaranteed to eliminate plastic waste and make your life easier.”</em></div><div class=grid><div><label>Audience mismatch</label><textarea id=a1></textarea></div><div><label>Unsupported claim</label><textarea id=a2></textarea></div><div><label>Ethical or brand risk</label><textarea id=a3></textarea></div><div><label>Improved message</label><textarea id=a4></textarea></div></div><div class=spread><span class=small>No word minimum in this demo. The assessment target is judgment, not prompt writing.</span><button class=btn onclick=subAI()>Save & Continue →</button></div>`}function subAI(){let v=['a1','a2','a3','a4'].map(id=>document.getElementById(id).value.trim()||'[not completed in demo]');save('ai',`Audience mismatch: ${v[0]} | Unsupported claim: ${v[1]} | Risk: ${v[2]} | Improved message: ${v[3]}`);setTier(4)}
function t4(){return `${ctx('Your manager says the team has one designer, a small paid media budget, and two weeks before launch. You cannot pursue all four campaign options. Choose one top priority and one initiative to deprioritize until next quarter.')}<table class=tbl><tr><th>Option</th><th>Reach</th><th>Conversion signal</th><th>Cost</th><th>Operational note</th></tr><tr><td>TikTok creator post</td><td>High</td><td>Low</td><td>Low</td><td>Strong comments, weak purchase intent</td></tr><tr><td>Instagram product ads</td><td>Medium</td><td>Medium</td><td>Medium</td><td>Strong clicks and clear creative path</td></tr><tr><td>Email campaign</td><td>Low</td><td>High</td><td>Low</td><td>Small list, but converts once opened</td></tr><tr><td>Campus pop-up event</td><td>Low</td><td>High</td><td>High</td><td>High trust, limited scale, high staff time</td></tr></table><div class=grid><div><label>Top priority</label><select id=prio><option>TikTok creator post</option><option>Instagram product ads</option><option>Email campaign</option><option>Campus pop-up event</option></select></div><div><label>Deprioritize until next quarter</label><select id=dep><option>TikTok creator post</option><option>Instagram product ads</option><option>Email campaign</option><option>Campus pop-up event</option></select></div></div><label>Rationale</label><textarea id=rat placeholder="Explain your top priority, deprioritized option, and one test you would run next.">${s.p.prio}</textarea><div class=spread><span class=small>No word minimum in this demo. This is a constrained prioritization task, not a mix-and-match exercise.</span><button class=btn onclick=subPrio()>Save & Continue →</button></div>`}function subPrio(){let p=document.getElementById('prio').value,d=document.getElementById('dep').value,r=document.getElementById('rat').value.trim()||'[Demo note: rationale not completed]';save('prio',`Top priority: ${p}. Deprioritize: ${d}. Rationale: ${r}`);setTier(5)}
function summary(){return `<b>ICP:</b> ${esc(s.p.icp||'Not yet saved')}<br><b>Positioning:</b> ${esc(s.p.pos||'Not yet saved')}<br><b>AI critique:</b> ${esc(s.p.ai||'Not yet saved')}<br><b>Campaign priority:</b> ${esc(s.p.prio||'Not yet saved')}`}function t5(){return `${ctx('You are preparing the final campaign brief for your manager. This is not a new portfolio from scratch. Assemble the work you already completed, edit it for clarity, and add any missing details.')}<div class="info neutral"><b>Use your saved artifacts:</b><br>${summary()}</div><label>Final campaign recommendation brief</label><textarea id=final style="min-height:200px" placeholder="Summarize the ICP, positioning, revised message, campaign priority, deprioritized option, test plan, ethical risk, and success metrics.">${s.p.final}</textarea><div class=spread><span class=small>No word minimum in this demo. Rubric: audience fit, positioning clarity, evidence use, prioritization, ethics, and metrics.</span><button class=btn onclick=subFinal()>Submit Final Brief</button></div><div id=result></div>`}function subFinal(){let v=document.getElementById('final').value.trim()||'[Demo note: final brief not completed]';save('final',v);document.getElementById('result').innerHTML='<div class="info green" style="margin-top:14px"><b>Final portfolio submitted.</b> The student completed a coherent entry-level marketing workflow.</div>'}
function render(){document.getElementById('root').innerHTML=s.started?shell([t1,t2,t3,t4,t5][s.tier-1]()):overview()}render();
</script></body></html>

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AP Sales 4CID Prototype v5</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#f8fafc;color:#0f172a}.wrap{max-width:920px;margin:0 auto;padding:24px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;box-shadow:0 1px 4px #0001;overflow:hidden}.body{padding:22px}.hdr{background:#0f172a;color:#fff;padding:18px 22px}.header-kicker{font:11px ui-monospace,monospace;letter-spacing:.1em;text-transform:uppercase;color:#94a3b8;margin-bottom:4px}.title{font:700 19px Georgia,serif;line-height:1.35}.logo{width:34px;height:34px;border-radius:8px;background:#1e40af;color:#fff;display:inline-flex;align-items:center;justify-content:center;font:800 13px ui-monospace,monospace;margin-right:10px}h1{font:700 28px Georgia,serif;margin:14px 0 8px}.k{font:11px ui-monospace,monospace;letter-spacing:.1em;text-transform:uppercase;color:#64748b}.muted{color:#64748b;line-height:1.6;font-size:14px}.tiers{display:grid;gap:8px;margin:20px 0}.tier{display:flex;gap:12px;align-items:center;padding:13px;border:1px solid #e5e7eb;background:#f8fafc;border-radius:10px;cursor:pointer}.tier:hover{box-shadow:0 0 0 2px #1e40af}.num{width:30px;height:30px;border-radius:50%;background:#dbeafe;color:#1e40af;display:flex;align-items:center;justify-content:center;font:800 13px ui-monospace,monospace}.small{font-size:12px;color:#64748b}.btn{border:0;border-radius:8px;background:#1e40af;color:#fff;padding:12px 18px;font-weight:800;cursor:pointer}.btn.full{width:100%;padding:14px}.btn:disabled{background:#d1d5db;color:#9ca3af}.btn2{border:1px solid #e2e8f0;border-radius:7px;background:#fff;color:#475569;padding:9px 13px;font-weight:700;cursor:pointer}.nav{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}.navdots{display:flex;gap:6px;flex-wrap:wrap}.dot{width:30px;height:30px;border-radius:50%;border:2px solid #e2e8f0;background:#f1f5f9;color:#94a3b8;font:800 11px ui-monospace,monospace;cursor:pointer}.dot.active{border-color:#1e40af;background:#dbeafe;color:#1e40af}.dot.done{border-color:#1e40af;background:#1e40af;color:white}.barbox{margin-bottom:16px}.barlabels{display:flex;justify-content:space-between;font:11px ui-monospace,monospace;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin-bottom:5px}.bars{display:flex;gap:4px}.bar{height:4px;flex:1;border-radius:2px;background:#e5e7eb}.info{padding:14px 16px;border-radius:8px;border:1px solid;margin-bottom:12px;font-size:13px;line-height:1.6}.context{background:#eef2ff;border-color:#c7d2fe;color:#3730a3}.neutral{background:#f8fafc;border-color:#cbd5e1;color:#334155}.green{background:#f0fdf4;border-color:#86efac;color:#166534}.red{background:#fef2f2;border-color:#fecaca;color:#991b1b}.yellow{background:#fefce8;border-color:#fde68a;color:#92400e}.prompt{font:16px Georgia,serif;line-height:1.65;margin-bottom:16px;color:#1f2937}.opt{width:100%;padding:11px 14px;border-radius:8px;border:1.5px solid #e5e7eb;background:#f9fafb;text-align:left;cursor:pointer;margin-bottom:8px;font-size:14px;line-height:1.5;display:flex;gap:10px}.opt.selected{background:#eff6ff;border-color:#3b82f6;color:#1d4ed8}.opt.correct{background:#f0fdf4;border-color:#4ade80;color:#166534}.opt.wrong{background:#fef2f2;border-color:#f87171;color:#991b1b}.letter{font:800 13px ui-monospace,monospace;min-width:18px}textarea,select{width:100%;padding:12px;border-radius:8px;border:1.5px solid #d1d5db;font-size:14px;line-height:1.6;outline:none;background:#fff}textarea{min-height:110px;resize:vertical}label{display:block;font-size:12px;font-weight:800;color:#334155;margin-bottom:5px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{margin-bottom:12px}.spread{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:12px;flex-wrap:wrap}.meta{margin-top:20px;padding:12px 14px;background:#f8fafc;border:1px dashed #cbd5e1;border-radius:8px}.meta h3,.portfolio h3{font:11px ui-monospace,monospace;text-transform:uppercase;letter-spacing:.1em;color:#64748b;margin-bottom:4px}.meta p{font-size:12px;color:#475569}.portfolio{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;margin-top:18px}.pi{font-size:12px;color:#475569;padding:5px 0;border-top:1px solid #e2e8f0}.pi:first-of-type{border-top:0}.tbl{width:100%;border-collapse:collapse;margin:12px 0 16px;font-size:13px}.tbl th{background:#f1f5f9;color:#334155;text-align:left}.tbl th,.tbl td{padding:8px;border:1px solid #e2e8f0;vertical-align:top}.chat{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px;margin-bottom:12px;max-height:420px;overflow-y:auto}.msg{max-width:88%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.55;margin-bottom:10px}.marcus{background:#f1f5f9;color:#1f2937;border-bottom-left-radius:2px}.rep{background:#1e40af;color:#fff;border-bottom-right-radius:2px;margin-left:auto}.label{font:10px ui-monospace,monospace;color:#94a3b8;margin-bottom:3px}.foot{display:flex;justify-content:space-between;color:#cbd5e1;font:11px ui-monospace,monospace;margin-top:16px}@media(max-width:760px){.wrap{padding:16px}.nav{flex-direction:column;align-items:flex-start}.grid{grid-template-columns:1fr}}
</style></head><body><div id="root"></div><script>
const ROLE='You are a Sales Development Representative at Pinnacle, a project management platform for small teams.';const P='The core sales assessment builds toward a live discovery simulation and performance scorecard. The CRM update and pipeline prioritization are optional post-call extensions that show how the same assessment model can connect to real sales operations.';const T=[['Identify Prospect Pain','Part-Task Practice','High Scaffold','#4ade80','📋','Students isolate prospect research and pain identification before entering the sales conversation.'],['Critique AI Outreach','Supportive Information + Part-Task Practice','High-Moderate Scaffold','#a3e635','🤖','Students evaluate AI-generated outreach for personalization, claims, customer relevance, and consultative tone.'],['Plan Discovery','Procedural Information + Part-Task Practice','Moderate Scaffold','#facc15','🔍','Students select discovery questions for a defined live buyer call.'],['Handle ROI Objection','Supportive Information + Whole Task','Low Scaffold','#fb923c','💬','Students respond to an objection during discovery using customer context and business impact.'],['Live Chat Simulation','Whole Task','No Scaffold','#f87171','📞','Students conduct a simulated buyer conversation from opening to next step.'],['Optional: CRM Update','Optional Transfer Task','Extension','#64748b','🧾','Students document the call, identify pipeline stage, and recommend next action.'],['Optional: Pipeline Prioritization','Optional Data-Informed Extension','Extension','#475569','📊','Students use pipeline data to prioritize opportunities and actions.']];
const s={started:false,tier:1,sel:null,qs:[],msgs:[{role:'marcus',text:'Bright Spark Agency, this is Marcus.'}],p:{pain:'',ai:'',disc:'',obj:'',call:'',crm:'',pipe:''}};function esc(x){return String(x).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function setTier(i){s.started=true;s.tier=i;render()}function start(){setTier(1)}function back(){s.tier===1?s.started=false:s.tier--;render()}function save(k,v){s.p[k]=v}
function overview(){return `<div class=wrap><div class=card><div class=body><span class=logo>AP</span><span class=k>AP Marketing & Sales</span><h1>Sales Prototype: Live Discovery Simulation</h1><p class=muted><b>Role:</b> ${ROLE}</p><br><p class=muted><b>Assessment goal:</b> ${P}</p><div class=tiers>${T.map((t,i)=>`<div class=tier onclick=setTier(${i+1})><div class=num>${i+1}</div><div style=flex:1><b>${t[0]}</b><div class=small>${t[1]}</div></div><span style="width:9px;height:9px;border-radius:50%;background:${t[3]}"></span></div>`).join('')}</div><button class="btn full" onclick=start()>Begin from Task 1 →</button></div></div></div>`}
function head(i){return ['You need to understand Marcus Chen’s real business pain before you reach out.','You used AI to draft outreach. Now review it before sending anything to the buyer.','You are preparing for a scheduled 15-minute live discovery call with Marcus.','Marcus raises an ROI objection during the discovery call.','Conduct a simulated live chat conversation with Marcus, then review a performance scorecard.','Optional extension: document what happened in the CRM.','Optional extension: use pipeline data to decide where to focus this week’s sales effort.'][i-1]}
function shell(c){let i=s.tier,t=T[i-1];return `<div class=wrap><div class=nav><div><button class=btn2 onclick=back()>← ${i===1?'Overview':'Task '+(i-1)}</button> <span class=logo>AP</span><span class=k>SDR · Pinnacle</span></div><div class=navdots>${T.map((_,j)=>`<button class="dot ${j+1===i?'active':j+1<i?'done':''}" onclick=setTier(${j+1})>${j+1}</button>`).join('')}</div></div><div class=barbox><div class=barlabels><span>Scaffold Level</span><span style="color:${t[3]}">${t[2]}</span></div><div class=bars>${T.map((_,j)=>`<div class=bar style="background:${j+1<=i?t[3]:'#e5e7eb'}"></div>`).join('')}</div></div><div class=card><div class=hdr><div class=header-kicker>${t[4]} Task ${i}: ${t[0]}</div><div class=title>${head(i)}</div></div><div class=body>${c}${meta(i)}${portfolio()}</div></div><div class=foot><span>4CID · Real-World Task Transfer · AP Sales</span><span>Mari Nazary | marinazary.com</span></div></div>`}
function ctx(x){return `<div class="info context"><b>Scenario:</b> ${x}</div>`}function profile(){return `<div class="info neutral"><b>Buyer profile:</b> Marcus Chen owns Bright Spark Agency, a 12-person marketing agency. His team manages projects through email, spreadsheets, texts, and sticky notes. They miss client deadlines two to three times per month. Last quarter, a deliverable slipped and the agency lost a major client. Marcus is skeptical because his team tried Asana two years ago and stopped using it after three weeks.</div><div class="info neutral"><b>Product:</b> Pinnacle centralizes tasks, deadlines, and team communication. It costs $49 per user per month.</div>`}function meta(i){let t=T[i-1];return `<div class=meta><h3>Demo Context · Task ${i} · ${t[0]}</h3><p>4CID: <b>${t[1]}</b> — ${t[5]}</p></div>`}function portfolio(){let arr=[['Pain summary',s.p.pain],['AI outreach critique',s.p.ai],['Discovery plan',s.p.disc],['Objection response',s.p.obj],['Call transcript',s.p.call],['Optional CRM update',s.p.crm],['Optional pipeline priority',s.p.pipe]];return `<div class=portfolio><h3>Saved sales evidence</h3><div class=pi><b>What this is:</b> ${P}</div>${arr.map(a=>`<div class=pi><b>${a[0]}:</b> ${a[1]?esc(a[1]).slice(0,150)+(a[1].length>150?'...':''):'<span style=color:#94a3b8>Not yet saved</span>'}</div>`).join('')}</div>`}
function t1(){let opts=[['a','Marcus needs a cheaper way to send emails to clients'],['b','Marcus’s team is losing track of work, missing deadlines, and losing client trust'],['c','Marcus wants to hire more staff'],['d','Marcus needs a better tool for designing client presentations']];return `${ctx('Before you contact Marcus, your sales manager asks you to review the prospect profile and identify the business pain most relevant to Pinnacle.')}${profile()}<p class=prompt>What is Marcus’s core business pain?</p>${opts.map(o=>`<button class=opt onclick=pain('${o[0]}')><span class=letter>${o[0].toUpperCase()}.</span>${o[1]}</button>`).join('')}<div id=fb></div><div class=spread><span class=small>Correct answers save automatically to the portfolio. Top navigation also works.</span><button class=btn onclick=contPain()>Continue →</button></div>`}function pain(id){s.sel=id;document.querySelectorAll('.opt').forEach((b,i)=>{let ids=['a','b','c','d'];b.className='opt';if(ids[i]==='b')b.classList.add('correct');if(ids[i]===id&&id!=='b')b.classList.add('wrong')});let msgs={a:'Email is part of the mess, but the strategic pain is broader: missed ownership, missed deadlines, and lost client trust. Do not anchor too narrowly on one tool.',b:'The relevant sales pain is missed work, lost trust, and revenue risk.',c:'Hiring may be one possible response, but Marcus has not said capacity is the root problem. The evidence points to workflow visibility and accountability.',d:'Design tools are not connected to the buyer evidence. The urgent problem is project execution, not presentation creation.'};let good=id==='b';document.getElementById('fb').innerHTML=`<div class="info ${good?'green':'red'}"><b>${good?'Correct.':'Not quite.'}</b> ${msgs[id]}</div>`}
function contPain(){if(!s.sel){alert('Select an answer first, or use the top navigation to jump to another task.');return}save('pain','Marcus is losing client trust and revenue because his team lacks visibility, accountability, and a reliable project workflow.');setTier(2)}
function t2(){return `${ctx('You asked an AI tool to draft an outreach email to Marcus. Before sending it, you need to check whether it is personalized, accurate, and consultative.')}<div class="info neutral"><b>AI draft:</b><br><em>“Hi Marcus, Pinnacle is the best project management platform for agencies. It will solve your missed deadlines and improve your team immediately. Are you free for a demo tomorrow?”</em></div><div class=grid><div><label>Weak personalization</label><textarea id=a1></textarea></div><div><label>Unsupported claim</label><textarea id=a2></textarea></div><div><label>Missed opportunity</label><textarea id=a3></textarea></div><div><label>Improved outreach</label><textarea id=a4></textarea></div></div><div class=spread><span class=small>No word minimum in this demo. Each critique component is separated.</span><button class=btn onclick=subAI()>Save & Continue →</button></div>`}function subAI(){let v=['a1','a2','a3','a4'].map(id=>document.getElementById(id).value.trim()||'[not completed in demo]');save('ai',`Weak personalization: ${v[0]} | Unsupported claim: ${v[1]} | Missed opportunity: ${v[2]} | Improved outreach: ${v[3]}`);setTier(3)}
const Q=[['a','How do you currently track project deadlines and who owns each deliverable?',true],['b','Have you looked at any other project management tools before?',false],['c','What happens when a deadline gets missed, and how does that affect clients?',true],['d','How much budget do you have for software this year?',false],['e','How does your team communicate about project updates today?',true],['f','Are you the final decision maker for this purchase?',false]];function t3(){s.qs=[];return `${ctx('Marcus agreed to a 15-minute discovery call. Your goal is not to pitch first. Your goal is to understand his workflow, quantify the cost of the problem, and determine whether Pinnacle is a fit.')}<p class=prompt>Select the three best opening discovery questions for the live call.</p>${Q.map(o=>`<button class=opt onclick=toggleQ('${o[0]}')><span class=letter>${o[0].toUpperCase()}.</span>${o[1]}</button>`).join('')}<div class=spread><span class=small id=qcount>0/3 selected</span><button class=btn id=checkQ disabled onclick=checkQ()>Check Selections</button></div><div id=qfb></div>`}function toggleQ(id){if(s.qs.includes(id))s.qs=s.qs.filter(x=>x!==id);else if(s.qs.length<3)s.qs.push(id);document.querySelectorAll('.opt').forEach((b,i)=>b.classList.toggle('selected',s.qs.includes(Q[i][0])));document.getElementById('qcount').textContent=`${s.qs.length}/3 selected`;document.getElementById('checkQ').disabled=s.qs.length!==3}function checkQ(){let good=['a','c','e'];let ok=good.every(x=>s.qs.includes(x));document.querySelectorAll('.opt').forEach((b,i)=>{b.classList.remove('selected');if(Q[i][2])b.classList.add('correct');if(s.qs.includes(Q[i][0])&&!Q[i][2])b.classList.add('wrong')});let txt=s.qs.map(id=>Q.find(q=>q[0]===id)[1]).join(' | ');s.tmpDisc='Selected discovery questions: '+txt;let wrong={b:'B asks about tools too early. It can be useful later, but it shifts to vendor comparison before you understand pain.',d:'D puts budget before value. That can make the call feel transactional before Marcus has connected the problem to business impact.',f:'F is an authority question. It matters, but as an opener it feels like qualification instead of discovery.'};let details=s.qs.filter(x=>wrong[x]).map(x=>`<li>${wrong[x]}</li>`).join('');document.getElementById('qfb').innerHTML=`<div class="info ${ok?'green':'yellow'}" style="margin-top:12px"><b>${ok?'Strong selection.':'Best set: A, C, and E.'}</b> These questions open on process and pain before product, price, or authority.${details?'<ul style="margin:8px 0 0 18px">'+details+'</ul>':''}</div><button class=btn onclick=saveDisc()>Save to Portfolio & Continue →</button>`}function saveDisc(){save('disc',s.tmpDisc||'Selected discovery questions not completed in demo');setTier(4)}
function t4(){return `${ctx('Midway through the discovery call, Marcus understands what Pinnacle does but is worried about whether the cost is justified for a small agency.')}<div class="info neutral"><b>Marcus says:</b><br><em>“Pinnacle sounds useful, but $49 per user per month adds up. That is almost $600 a month for my team. I am not sure the ROI is there.”</em></div><label>Your response</label><textarea id=obj placeholder="That is a fair concern. Can I ask what a missed deadline currently costs you? ...">${s.p.obj}</textarea><div class=spread><span class=small>No word minimum in this demo. Rubric: empathy, discovery, business impact, and ethical persuasion.</span><button class=btn onclick=subObj()>Save & Continue →</button></div>`}function subObj(){let v=document.getElementById('obj').value.trim()||'[Demo note: objection response not completed]';save('obj',v);setTier(5)}
function chat(){return s.msgs.map(m=>`<div><div class=label>${m.role==='rep'?'YOU · SALES REP':'MARCUS · BUYER'}</div><div class="msg ${m.role==='rep'?'rep':'marcus'}">${esc(m.text)}</div></div>`).join('')}
function scorecard(){if(!s.p.call)return '';return `<div class="info neutral" style="margin-top:14px"><b>Sales Performance Scorecard</b><br>This is the core assessment evidence for the sales prototype. In a full implementation, this could be scored by trained readers with AI-assisted flagging for consistency.<br><br><table class=tbl><tr><th>Competency</th><th>Evidence to look for</th></tr><tr><td>Professional opening</td><td>Introduces self, confirms time, sets a helpful agenda.</td></tr><tr><td>Discovery quality</td><td>Asks about current workflow, missed deadlines, team communication, and business impact.</td></tr><tr><td>Value connection</td><td>Connects Pinnacle to Marcus’s stated pain, not generic features.</td></tr><tr><td>Objection handling</td><td>Handles ROI and adoption concerns with empathy and evidence, not pressure or discounting.</td></tr><tr><td>Next step</td><td>Earns a clear demo or follow-up tied to Marcus’s agency workflow.</td></tr></table><div class="spread"><span class=small>Core assessment complete. CRM and pipeline tasks are optional extensions.</span><div><button class=btn2 onclick=setTier(6)>Optional CRM Update →</button> <button class=btn2 onclick=setTier(7)>Optional Pipeline →</button></div></div></div>`}
function t5(){return `${ctx('Now you will conduct the simulated live chat version of the buyer call. Marcus has already answered the phone. Type your response, then generate Marcus’s next reply. The prototype uses scripted buyer responses to show the interaction pattern.')}<div id=chat class=chat>${chat()}</div><label>Your response</label><textarea id=reply placeholder="Hi Marcus, this is..."></textarea><div class=spread><span class=small>Goal: open, discover pain, connect value, address concern, and earn a next step.</span><div><button class=btn2 onclick=resetChat()>Reset Chat</button> <button class=btn onclick=sendReply()>Send & Generate Marcus</button></div></div><div class=spread><span class=small>When complete, save the transcript and view the performance scorecard.</span><button class=btn onclick=saveTranscript()>Save Transcript & View Scorecard</button></div>${scorecard()}`}
function sendReply(){let v=document.getElementById('reply').value.trim();if(v.length<3){alert('Type a response first.');return}s.msgs.push({role:'rep',text:v});let n=s.msgs.filter(m=>m.role==='rep').length;let rs=['Thanks. I have about 15 minutes. We are pretty messy right now, but I am skeptical because my team has ignored tools before.','Most things live in email and spreadsheets. The biggest issue is that nobody knows who owns what once client feedback starts coming in.','A missed deadline usually means an apology call, some free work, and sometimes a lost renewal. We lost a client last quarter because of it.','The price makes me hesitate. At 12 people, that is almost $600 a month. I need to understand the ROI.','Adoption is my other concern. We tried Asana and it lasted three weeks, so I need to know this will not become shelfware.','A demo focused on how an agency team would actually use it would be helpful. I do not need a generic product tour.','Next week could work. I would want my operations lead included because she manages the project traffic day to day.','That sounds like a reasonable next step. Send me a few times and include what you would want us to prepare.','I think we have enough for today. I am open to the follow-up if it stays focused on our workflow and team adoption.'];s.msgs.push({role:'marcus',text:rs[Math.min(n-1,rs.length-1)]});render()}
function resetChat(){s.msgs=[{role:'marcus',text:'Bright Spark Agency, this is Marcus.'}];s.p.call='';render()}
function saveTranscript(){save('call',s.msgs.map(m=>`${m.role==='rep'?'Rep':'Marcus'}: ${m.text}`).join(' | '));render()}
function t6(){return `${ctx('Optional extension. The core sales assessment ended with the live simulation scorecard. This task shows how the same evidence could transfer into CRM documentation for a manager or account executive.')}<div class=grid><div><label>Pipeline stage</label><select id=stage><option>Discovery complete</option><option>Demo scheduled</option><option>Proposal sent</option><option>Unqualified lead</option><option>Closed lost</option></select></div><div><label>Forecast confidence</label><select id=conf><option>70%</option><option>50%</option><option>35%</option><option>15%</option></select></div><div><label>Pain point</label><textarea id=c1></textarea></div><div><label>Business impact</label><textarea id=c2></textarea></div><div><label>Objection</label><textarea id=c3></textarea></div><div><label>Next step</label><textarea id=c4></textarea></div></div><div class=spread><span class=small>No word minimum in this demo. CRM documentation is an optional post-call extension.</span><button class=btn onclick=subCRM()>Save Optional CRM & Continue →</button></div>`}function subCRM(){let v=['c1','c2','c3','c4'].map(id=>document.getElementById(id).value.trim()||'[not completed in demo]');save('crm',`Stage: ${document.getElementById('stage').value}. Confidence: ${document.getElementById('conf').value}. Pain: ${v[0]} Impact: ${v[1]} Objection: ${v[2]} Next step: ${v[3]}`);setTier(7)}
function t7(){return `${ctx('Optional extension. It is Monday morning. You have limited time this week, so your manager asks you to prioritize your active opportunities and explain where you will focus first.')}<table class=tbl><tr><th>Prospect</th><th>Pain severity</th><th>Decision maker</th><th>Objection</th><th>Next step</th><th>Forecast</th></tr><tr><td>Bright Spark</td><td>High</td><td>Yes</td><td>ROI</td><td>Demo requested</td><td>70%</td></tr><tr><td>Northline Studio</td><td>Medium</td><td>No</td><td>Timing</td><td>Follow-up needed</td><td>35%</td></tr><tr><td>Campus Creative</td><td>High</td><td>Yes</td><td>Adoption</td><td>Trial requested</td><td>65%</td></tr><tr><td>BluePeak Media</td><td>Low</td><td>No</td><td>Budget</td><td>No next step</td><td>15%</td></tr></table><label>Pipeline prioritization recommendation</label><textarea id=pipe placeholder="Prioritize these two opportunities this week because...">${s.p.pipe}</textarea><div class=spread><span class=small>No word minimum in this demo. Assessment target: data-informed sales judgment.</span><button class=btn onclick=subPipe()>Save Optional Pipeline Recommendation</button></div><div id=result></div>`}function subPipe(){let v=document.getElementById('pipe').value.trim()||'[Demo note: pipeline recommendation not completed]';save('pipe',v);document.getElementById('result').innerHTML='<div class="info green" style="margin-top:14px"><b>Optional pipeline extension saved.</b> The core sales assessment remains the live simulation and performance scorecard.</div>'}
function render(){document.getElementById('root').innerHTML=s.started?shell([t1,t2,t3,t4,t5,t6,t7][s.tier-1]()):overview()}render();
</script></body></html>
